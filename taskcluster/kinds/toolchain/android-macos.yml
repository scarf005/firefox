---
task-defaults:
    worker-type: b-osx-arm64
    worker:
        max-run-time: 1800

macosx64-jdk-repack:
    description: "Java JDK (macOS) repack toolchain build"
    treeherder:
        symbol: TL(jdk-macos)
    run:
        using: toolchain-script
        script: repack-jdk-macos.sh
        resources:
            - 'python/mozboot/**/*android*'
        toolchain-artifact: project/gecko/jdk/jdk-macos.tar.zst
        toolchain-alias: macosx64-jdk
